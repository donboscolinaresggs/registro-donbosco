<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test formulario</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 500px; margin: 60px auto; padding: 20px; }
  h2 { color: #1F5C2E; }
  input { width: 100%; padding: 10px; font-size: 16px; border: 2px solid #ddd; border-radius: 4px; margin: 10px 0 20px; box-sizing: border-box; }
  button { background: #1F5C2E; color: white; padding: 12px 32px; font-size: 16px; border: none; border-radius: 4px; cursor: pointer; }
  #msg { margin-top: 20px; font-size: 15px; }
</style>
</head>
<body>
  <h2>⚜ Test de conexión</h2>
  <p>Ingresa tu nombre y envía. Si funciona, aparecerá en Google Sheets.</p>
  <form id="f">
    <label><b>Nombre:</b></label>
    <input type="text" name="nombre" placeholder="Escribe tu nombre" required>
    <button type="submit">Enviar prueba</button>
  </form>
  <div id="msg"></div>

<script>
  var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwAYwIFkt3Gsj2jEQF1jsR8ALaGnVcnG-waLXE1wi4PAqFtdt6N9Rm3QSUufxhTz4XX/exec';

  document.getElementById('f').addEventListener('submit', function(e) {
    e.preventDefault();
    var msg = document.getElementById('msg');
    msg.innerHTML = '<i>Enviando...</i>';
    
    var data = new FormData(this);
    
    fetch(SCRIPT_URL, {
      method: 'POST',
      body: data,
      mode: 'no-cors'
    })
    .then(function(response) {
      msg.innerHTML = '<b style="color:green">✅ Enviado. Revisa Google Sheets en tu Drive.</b>';
      document.getElementById('f').reset();
    })
    .catch(function(error) {
      msg.innerHTML = '<b style="color:red">❌ Error: ' + error.message + '</b>';
    });
  });
</script>
</body>
</html>
